run:
  name: dr_demo
  num_frames: 9
  seed: 42
  headless: true
  output_dir: datasets/dr_demo
scene:
  builder: default
  background: none
  ground_plane: true
objects:
- obj_id: obj_000
  count: 1
  physics:
    collider: true
    gravity: true
    mass: null
  semantic:
    class: obj_000
randomizers:
- type: lighting
  # dome = ambient fill: lo>0 so the scene is never fully dark (office/factory always lit).
  # Kept modest because fixtures below add the key light — avoids double-exposure blow-out.
  # (For indoor-only realism, point `hdri` at the Indoor subset; bright outdoor skies can
  #  over-expose — some exposure variance is fine/beneficial DR, full blow-out is not.)
  intensity:
  - 300
  - 900
  # blackbody colour temperature: warm (~3000K incandescent/warm-LED) <-> cool (~6500K office
  # fluorescent/daylight). Physically-plausible tint variety across environments.
  color_temperature:
  - 3000
  - 6500
  # HDRI env maps (localized into the repo for offline use by tools/fetch_isaac_assets.py).
  # Online alternative (no local files): hdri: isaac_skies  (or isaac_skies:Indoor,Night).
  hdri: assets/env/hdri
  hdri_rotate: true
  # overhead fixtures -> directional key light + cast shadows (ceiling panel / angled window).
  # count lo=0 => some frames are pure soft ambient (also realistic). Intensities kept modest
  # since dome+HDRI already light the scene; raise if you want harsher, higher-contrast light.
  fixtures:
    kinds:
    - rect
    - distant
    count:
    - 0
    - 2
    intensity:
    - 400
    - 2000
    color_temperature:
    - 3000
    - 6500
    distance:
    - 2.0
    - 5.0
    elevation_deg:
    - 35
    - 85
    size:
    - 0.5
    - 2.0
- type: materials
  target: objects
  roughness:
  - 0.1
  - 0.8
  metallic:
  - 0.0
  - 0.4
  base_color: hsv_jitter
- type: materials
  target: ground
  # Realistic floor library (wood / stone / tile / gravel / marble ...) localized by
  # tools/fetch_isaac_assets.py -> replaces the unrealistic checkerboard ground. Offline.
  textures: assets/textures/ground
  texture_prob: 0.9
  texture_scale:
  - 0.7
  - 3.0
  base_color: hsv_jitter
- type: pose
  target: objects
  position:
    x:
    - -0.15
    - 0.15
    y:
    - -0.15
    - 0.15
    z:
    - 0.0
    - 0.1
  rotation: uniform_so3
- type: camera
  mode: look_at
  distance:
  - 0.6
  - 1.1
  elevation_deg:
  - 20
  - 60
  azimuth_deg:
  - -180
  - 180
sensors:
- name: cam0
  type: ideal
  resolution:
  - 1280
  - 720
  intrinsics:
    fx: 952.2
    fy: 952.2
    cx: 640.0
    cy: 360.0
annotators:
  rgb: true
  depth: true
  semantic_segmentation: true
  instance_segmentation: true
  bbox_2d: true
  bbox_3d: true
  pose_6d: true
writer:
  format: generic
  depth_png_bits: 16

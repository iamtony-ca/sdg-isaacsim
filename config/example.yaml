# Example SDG run config — generic, object-agnostic.
# See SDG.md §2 for the full schema. A new task/object = a new config, not new code.

run:
  name: example
  num_frames: 50
  seed: 42
  headless: true
  output_dir: datasets/example

scene:
  builder: default          # sdg/scene registry key
  background: none          # none | ground_plane | warehouse | <usd path>
  ground_plane: true

objects:
  - obj_id: obj_000         # loads from assets/obj/obj_000/
    count: 1
    physics: {collider: true, gravity: true, mass: null}
    semantic: {class: obj_000}

randomizers:
  - {type: lighting,    intensity: [500, 3000], count: [1, 3], kinds: [dome, distant, rect]}
  - {type: materials,   roughness: [0.1, 0.9], metallic: [0.0, 0.6], base_color: hsv_jitter}
  - {type: pose,        target: objects, position: {x: [-0.2, 0.2], y: [-0.2, 0.2], z: [0.0, 0.1]}, rotation: uniform_so3}
  - {type: camera,      mode: look_at, distance: [0.6, 2.0], elevation_deg: [20, 80], azimuth_deg: [-180, 180]}
  - {type: distractors, pool: [], count: [0, 3]}

sensors:
  - name: cam0
    type: ideal
    resolution: [1280, 720]
    intrinsics: {focal_mm: null, hfov_deg: 69}

annotators:
  rgb: true
  depth: true
  semantic_segmentation: true
  instance_segmentation: true
  bbox_2d: true
  bbox_3d: false
  normals: false
  keypoints: []
  pose_6d: true

writer:
  format: generic
  depth_png_bits: 16
  mask_binary: true

# Example SDG run config — generic, object-agnostic.
# See SDG.md §2 for the full schema. A new task/object = a new config, not new code.

run:
  name: example
  num_frames: 50
  seed: 42
  headless: true
  output_dir: datasets/example

scene:
  builder: default          # sdg/scene registry key
  background: none          # none | ground_plane | warehouse | <usd path>
  ground_plane: true

objects:
  - obj_id: obj_000         # loads from assets/obj/obj_000/
    count: 1
    physics: {collider: true, gravity: false, mass: null}   # gravity off: pose controls placement
    semantic: {class: obj_000}
    origin: bottom          # pose origin = bottom-face centre (auto from bbox); rests on ground

randomizers:
  # lighting: 3 layers — dome ambient (intensity; keep lo>0 so never fully dark) + blackbody
  #   colour_temperature (warm<->cool fixtures/daylight) + optional overhead `fixtures` (rect
  #   ceiling panels / distant window-sun) giving directional light + cast shadows. HDRI env
  #   maps come from a local dir (offline; populate via tools/fetch_isaac_assets.py) or the
  #   online keyword `isaac_skies`. See config/dr_demo.yaml for a full `fixtures` example.
  - {type: lighting,    intensity: [300, 900], color_temperature: [3000, 6500],
     hdri: assets/env/hdri, hdri_rotate: true,
     fixtures: {kinds: [rect, distant], count: [0, 2], intensity: [400, 2000],
                color_temperature: [3000, 6500], distance: [2.0, 5.0], elevation_deg: [35, 85], size: [0.5, 2.0]}}
  # materials(objects): per-object colour/roughness/metallic (UV-less meshes -> colour path).
  - {type: materials,   target: objects, roughness: [0.1, 0.9], metallic: [0.0, 0.6], base_color: hsv_jitter}
  # materials(ground): the ground fills the frame (camera looks down) — this IS the visible
  #   background. Randomize it across a realistic floor library (wood/stone/tile/gravel...),
  #   localized offline by tools/fetch_isaac_assets.py -> assets/textures/ground/.
  - {type: materials,   target: ground, textures: assets/textures/ground, texture_prob: 0.9, texture_scale: [0.7, 3.0], base_color: hsv_jitter}
  # origin:bottom + z:0 + rotation:yaw -> object rests on the ground (z=0), upright, heading varies.
  - {type: pose,        target: objects, position: {x: [-0.2, 0.2], y: [-0.2, 0.2], z: [0.0, 0.0]}, rotation: yaw}
  - {type: camera,      mode: look_at, distance: [0.6, 2.0], elevation_deg: [20, 80], azimuth_deg: [-180, 180]}
  # occluder: places clutter ON the camera->target ray -> GUARANTEED partial occlusion (unlike
  #   distractors, which scatter and may not cover). MUST come after pose+camera (reads this
  #   frame's target/camera positions). count lo=0 leaves some frames fully visible (diversity);
  #   occlusion_frac biases coverage, the true amount is visib_fract GT. Real occlusion GT needs
  #   writer.format:bop + annotators.amodal:true; the generic writer still bakes occlusion into
  #   the visible masks. Add an obj_id / usd to the pool (or an adjacent obj) for realistic
  #   occluders + similar-instance hard-negatives; target_region:<part class> stresses a part.
  # (occluder 원치 않으면 occluder 줄을 빼거나 count: [0,0]).
  - {type: occluder,    pool: [prim:cube, prim:cylinder, prim:sphere], count: [0, 2], occlusion_frac: [0.15, 0.45], jitter: 0.6}
  - {type: distractors, pool: [], count: [0, 3]}

sensors:
  - name: cam0
    type: ideal
    resolution: [1280, 720]
    # intrinsics — pick ONE mode:
    #   calibrated : {fx: 952.2, fy: 952.2, cx: 640.0, cy: 360.0}   # match a real camera (sim-to-real)
    #   focal      : {focal_mm: 24.0}                                # physical focal, square pixels
    #   fov        : {hfov_deg: 69}                                  # horizontal FOV, square pixels
    intrinsics: {hfov_deg: 69}

annotators:
  rgb: true
  depth: true
  semantic_segmentation: true
  instance_segmentation: true
  bbox_2d: true
  bbox_3d: false
  normals: false
  keypoints: []
  pose_6d: true

writer:
  format: generic
  depth_png_bits: 16
  mask_binary: true
